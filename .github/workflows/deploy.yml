name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Refresh event data
        if: github.event_name != 'push'
        env:
          IMPORT_USER_AGENT: BerlinArtOpeningsImporter/0.1 (+${{ github.server_url }}/${{ github.repository }})
          GEOCODER_USER_AGENT: BerlinArtOpeningsGeocoder/0.1 (+${{ github.server_url }}/${{ github.repository }})
          NOMINATIM_EMAIL: ${{ secrets.NOMINATIM_EMAIL }}
        run: |
          npm run import:events
          npm run geocode:venues

      - name: Commit refreshed data
        if: github.event_name != 'push'
        run: |
          if git diff --quiet -- public/data/events.json public/data/venues.json; then
            echo "No refreshed data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/events.json public/data/venues.json
          git commit -m "Refresh event data"
          git push

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
